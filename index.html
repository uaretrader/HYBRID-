<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMC APEX v20.0 | OPTIMIZED FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bloomberg-bg: #000000;
            --bloomberg-panel: #0a0a0a;
            --bloomberg-border: #1a1a1a;
            --bloomberg-accent: #00ff88;
            --bloomberg-warning: #ffcc00;
            --bloomberg-danger: #ff3366;
            --bloomberg-text: #c0c0c0;
            --bloomberg-text-dim: #666666;
            --bloomberg-gold: #ffcc00;
            --bloomberg-blue: #00aaff;
            --bloomberg-orange: #ff884d;
            --bloomberg-purple: #aa66ff;
            --gold-dim: rgba(255, 204, 0, 0.12);
            --news-ban: #ff3366;
        }
        
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background: var(--bloomberg-bg); 
            color: var(--bloomberg-text); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        
        .app-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .terminal-container { width: 100%; background: var(--bloomberg-bg); position: relative; z-index: 10; flex-shrink: 0; }
        
        .header { 
            padding: 8px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid rgba(0, 139, 139, 0.5); 
            background: #050505; 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        .brand-container { display: flex; flex-direction: column; align-items: flex-start; }
        .brand { font-weight: 800; font-size: 0.7rem; letter-spacing: 0; color: var(--bloomberg-accent); }
        .meta-label-sub { font-size: 0.5rem; color: var(--bloomberg-text-dim); letter-spacing: 1px; font-family: 'JetBrains Mono'; font-weight: 500; }
        
        #sys-status { 
            font-family: 'JetBrains Mono'; 
            font-size: 0.6rem; 
            font-weight: 500; 
            border-left: 2px solid var(--bloomberg-accent); 
            padding-left: 8px;
            display: inline-flex; 
            align-items: center; 
            gap: 6px;
        }
        .ws-status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 0%; transition: all 0.2s ease; }
        .ws-status-dot.live { background: var(--bloomberg-accent); box-shadow: 0 0 4px var(--bloomberg-accent); animation: pulseLive 1s ease infinite; }
        .ws-status-dot.reconnect { background: var(--bloomberg-orange); animation: pulseReconnect 0.8s ease infinite; }
        .ws-status-dot.fallback { background: var(--bloomberg-blue); animation: pulseFallback 1s ease infinite; }
        .ws-status-dot.offline { background: var(--bloomberg-danger); }
        .ws-status-dot.connecting { background: var(--bloomberg-warning); animation: pulseConnecting 0.8s ease infinite; }
        .ws-status-dot.stale { background: var(--bloomberg-danger); animation: pulseStale 1.5s ease infinite; }
        @keyframes pulseLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes pulseReconnect { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes pulseFallback { 0%, 100% { opacity: 1; background: var(--bloomberg-blue); } 50% { opacity: 0.6; background: #0088cc; } }
        @keyframes pulseConnecting { 0%, 100% { opacity: 1; background: var(--bloomberg-warning); } 50% { opacity: 0.5; background: #dd9900; } }
        @keyframes pulseStale { 0%, 100% { opacity: 1; background: var(--bloomberg-danger); } 50% { opacity: 0.4; background: #cc0033; } }
        
        .nav-section { display: flex; gap: 8px; padding: 10px 16px; justify-content: space-between; flex-wrap: wrap; background: #050505; align-items: center; border-bottom: 1px solid var(--bloomberg-border); }
        .nav-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .btn-tab { 
            background: transparent; 
            border: none;
            color: var(--bloomberg-text-dim); 
            padding: 5px 12px; 
            border-radius: 0px; 
            font-size: 0.65rem; 
            font-weight: 500; 
            cursor: pointer; 
            font-family: 'JetBrains Mono'; 
            transition: 0.2s; 
        }
        .btn-tab.active { 
            color: var(--bloomberg-accent); 
            background: rgba(0, 255, 136, 0.08); 
            border: none;
        }
        .btn-tab.mode-active {
            color: var(--bloomberg-purple);
            background: rgba(170, 102, 255, 0.08);
        }
        .btn-tab.disabled { opacity: 0.5; cursor: wait; pointer-events: none; }
        
        .hero-display { padding: 12px 20px 16px; display: flex; flex-direction: column; width: 100%; }
        .hero-meta-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-bottom: 16px; font-family: 'JetBrains Mono'; font-weight: 500; font-size: 0.6rem; align-items: center; }
        
        .factor-card, .sma20-status, .sma50-status, .decision-panel, .rsi-panel, .mtf-paragraph-card {
            background: var(--bloomberg-panel);
            border: 1px solid var(--bloomberg-border);
            border-radius: 0px;
            box-shadow: none;
        }
        .factor-card { padding: 4px 10px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .factor-card.active { border-left: 3px solid var(--bloomberg-accent); background: rgba(0, 255, 136, 0.05); }
        .factor-card.ob-active { border-left: 3px solid var(--bloomberg-purple); background: rgba(170, 102, 255, 0.05); animation: obPulseRealtime 0.3s ease; }
        .factor-card.warning { border-color: var(--bloomberg-orange); }
        
        @keyframes obPulseRealtime {
            0% { box-shadow: 0 0 0 0 rgba(170, 102, 255, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(170, 102, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(170, 102, 255, 0); }
        }
        
        @keyframes divPulseRealtime {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        
        .sma20-status, .sma50-status {
            background: var(--bloomberg-panel);
            padding: 4px 10px;
            border: 1px solid var(--bloomberg-border);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .sma20-value, .sma50-value { font-weight: 700; min-width: 60px; text-align: right; }
        .sma20-status.bullish, .sma50-status.bullish { border-left: 3px solid var(--bloomberg-accent); }
        .sma20-status.bearish, .sma50-status.bearish { border-left: 3px solid var(--bloomberg-danger); }
        
        .decision-panel {
            background: var(--bloomberg-panel);
            padding: 8px 16px;
            border: 1px solid var(--bloomberg-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            font-family: 'JetBrains Mono';
            font-weight: 500;
            font-size: 0.65rem;
            flex: 1;
            min-height: 55px;
        }
        .decision-text { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .decision-label { color: var(--bloomberg-gold); }
        #decision-status { font-weight: 700; transition: all 0.3s ease; }
        .direction-arrow { font-size: 1.1rem; font-weight: 700; min-width: 35px; text-align: right; }
        
        .news-status {
            background: rgba(255, 51, 102, 0.15);
            border: 1px solid var(--news-ban);
            border-radius: 0px;
            padding: 2px 8px;
            font-size: 0.5rem;
            font-family: 'JetBrains Mono';
            color: var(--news-ban);
        }
        
        .rsi-panel { margin-top: 12px; margin-bottom: 12px; padding: 8px 12px; border: 1px solid var(--bloomberg-border); border-radius: 0px; background: var(--bloomberg-panel); }
        .rsi-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .rsi-tag { font-size: 0.5rem; font-weight: 500; color: var(--bloomberg-text-dim); font-family: 'JetBrains Mono'; }
        #rsi-val { font-family: 'JetBrains Mono'; font-size: 0.75rem; font-weight: 700; transition: color 0.2s; }
        .rsi-track { height: 2px; background: #2a2a2a; border-radius: 0px; overflow: hidden; }
        #rsi-bar { height: 100%; width: 0%; transition: width 0.1s linear, background 0.2s; background: var(--bloomberg-accent); }
        
        .data-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            width: 100%;
            background: var(--bloomberg-panel);
            border: 1px solid var(--bloomberg-border);
            margin-bottom: 12px;
        }
        .data-item { 
            background: transparent; 
            padding: 8px 8px; 
            border-right: 1px solid var(--bloomberg-border); 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .data-item:last-child { border-right: none; }
        .data-label { 
            font-size: 0.45rem; 
            color: var(--bloomberg-accent); 
            text-transform: uppercase; 
            margin-bottom: 4px; 
            display: block; 
            font-weight: 600; 
            letter-spacing: 0.5px; 
        }
        .data-val { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: #fff; font-weight: 700; }
        .data-item-swing-left { text-align: left; padding-left: 12px; }
        .data-item-swing-center { text-align: center; }
        .data-item-entry-center { text-align: center; }
        .data-item-tp-right { text-align: right; padding-right: 12px; }
        .data-item-pips-center { text-align: center; }
        
        .swing-high-text, .swing-low-text, .sl-red, .entry-gold, .tp-blue, .pips-cyan {
            color: #DCDCDC;
            transition: color 0.2s ease;
        }
        .swing-active .swing-high-text, .swing-active .swing-low-text {
            color: var(--bloomberg-accent) !important;
        }
        .sl-active .sl-red {
            color: var(--bloomberg-danger) !important;
        }
        .entry-active .entry-gold {
            color: var(--bloomberg-gold) !important;
        }
        .tp-active .tp-blue {
            color: var(--bloomberg-blue) !important;
        }
        .fvg-highlight { animation: fvgPulse 0.8s ease 2; text-shadow: 0 0 8px var(--bloomberg-accent); }
        .ob-highlight { animation: obPulse 0.8s ease 2; text-shadow: 0 0 8px var(--bloomberg-purple); }
        @keyframes fvgPulse { 0% { text-shadow: 0 0 0 var(--bloomberg-accent); } 100% { text-shadow: 0 0 12px var(--bloomberg-accent); } }
        @keyframes obPulse { 0% { text-shadow: 0 0 0 var(--bloomberg-purple); } 100% { text-shadow: 0 0 12px var(--bloomberg-purple); } }
        
        .mtf-paragraph-card { 
            background: var(--bloomberg-panel); 
            border-radius: 0px; 
            padding: 8px 12px; 
            margin: 0 0 10px 0; 
            border: 1px solid var(--bloomberg-border); 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .mtf-paragraph-text { font-family: 'JetBrains Mono'; font-size: 0.55rem; line-height: 1.4; }
        .mtf-highlight { font-weight: 700; padding: 1px 4px; background: rgba(0, 255, 136, 0.12); color: var(--bloomberg-accent); }
        .mtf-highlight-bull { color: var(--bloomberg-accent); }
        .mtf-highlight-bear { color: var(--bloomberg-danger); }
        .mtf-highlight-neutral { color: var(--bloomberg-text-dim); }
        
        .terminal-box { padding: 0 16px 14px 16px; width: 100%; }
        .card { background: transparent; border: none; padding: 0; }
        
        .footer-info { 
            display: flex; 
            gap: 12px; 
            margin-top: 8px; 
            flex-wrap: wrap; 
            align-items: center; 
            border-top: 1px solid var(--bloomberg-border);
            padding-top: 8px;
        }
        .session-module-new, .date-module-new, .clock-module-new {
            font-weight: 500; 
            background: transparent; 
            padding: 4px 8px; 
            border-radius: 0px;
            font-size: 0.55rem; 
            font-family: 'JetBrains Mono'; 
            border: none;
            color: var(--bloomberg-accent);
        }
        .clock-module-new { color: var(--bloomberg-text); }
        
        .syncing { opacity: 0.6; pointer-events: none; }
        .copied { background: rgba(0, 255, 136, 0.2) !important; }
        
        @keyframes decisionPulse { 0% { transform: scale(1); } 50% { transform: scale(1.01); text-shadow: 0 0 4px var(--bloomberg-accent); } 100% { transform: scale(1); } }
        .decision-animate { animation: decisionPulse 0.5s ease-in-out !important; }
        .signal-active { animation: signalPulse 1s ease-in-out infinite; }
        @keyframes signalPulse { 0%, 100% { opacity: 0.9; background: rgba(0, 255, 136, 0.1); } 50% { opacity: 1; background: rgba(0, 255, 136, 0.2); } }
        
        @keyframes arrowPulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 4px currentColor; }
            100% { opacity: 0.7; transform: scale(1); }
        }
        .arrow-pulse { animation: arrowPulse 0.2s ease !important; }
        
        #live-price { 
            font-family: 'JetBrains Mono'; 
            font-size: 2.8rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: #fff; 
            line-height: 1; 
            cursor: pointer; 
            margin-top: 8px; 
            margin-bottom: 8px;
            transition: opacity 0.2s; 
        }
        .price-decimal { color: var(--bloomberg-accent); opacity: 0.8; font-size: 2.5rem; }
        
        .reset-flash {
            animation: resetFlash 0.5s ease;
        }
        @keyframes resetFlash {
            0% { background: rgba(255, 204, 0, 0); }
            50% { background: rgba(255, 204, 0, 0.2); }
            100% { background: rgba(255, 204, 0, 0); }
        }
        
        .stale-warning {
            background: rgba(255, 51, 102, 0.2) !important;
            border-left: 3px solid var(--bloomberg-danger) !important;
        }
        
        .spike-warning {
            border: 1px solid var(--bloomberg-danger) !important;
            animation: spikePulse 0.5s ease;
        }
        @keyframes spikePulse {
            0%, 100% { box-shadow: 0 0 0 rgba(255, 51, 102, 0); }
            50% { box-shadow: 0 0 15px rgba(255, 51, 102, 0.5); }
        }
        
        .mode-indicator {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(170, 102, 255, 0.15);
            border: 1px solid var(--bloomberg-purple);
            color: var(--bloomberg-purple);
            font-size: 0.5rem;
            margin-left: 8px;
        }
        
        @media (max-width: 700px) {
            .hero-meta-row { gap: 6px; }
            .decision-panel { font-size: 0.55rem; padding: 5px 10px; }
            .direction-arrow { font-size: 1rem; min-width: 30px; }
            #live-price { font-size: 2rem; }
            .price-decimal { font-size: 1.8rem; }
            .data-grid { grid-template-columns: repeat(5, 1fr); font-size: 0.55rem; }
            .data-label { font-size: 0.4rem; }
            .data-val { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="terminal-container">
        <header class="header">
            <div class="brand-container">
                <div class="brand">SMC_APEX v20.0</div>
                <div class="meta-label-sub">URTRADER TERMINAL | SNIPER MODE</div>
            </div>
            <div id="sys-status">
                <span class="ws-status-dot" id="ws-status-dot"></span>
                <span id="ws-status-text">INITIALIZING</span>
            </div>
        </header>

        <nav class="nav-section">
            <div class="nav-group">
                <button class="btn-tab" data-pair="XAUUSDT" id="btn-XAUUSDT">XAUUSD</button>
                <button class="btn-tab" data-pair="BTCUSDT" id="btn-BTCUSDT">BTCUSD</button>
            </div>
            <div class="nav-group">
                <button class="btn-tab" data-tf="4h" id="tf-4h">H4</button>

            </div>
            <div class="mode-section" style="display: flex; width: 100%; padding: 8px 16px; background: #050505; border-bottom: 1px solid var(--bloomberg-border);">
                <button class="btn-tab mode-active" data-mode="conservative" id="mode-conservative">CONSERVATIVE</button>
                <span style="flex: 1;"></span>
                <button class="btn-tab" data-mode="sniper" id="mode-sniper">🎯 SNIPER</button>
            </div>
        </nav>

        <main class="hero-display">
            <div class="hero-meta-row">
                <div class="sma20-status" id="sma20-status">
                    <span>MA</span>
                    <span class="sma20-value" id="sma20-value">--</span>
                </div>
                <div class="factor-card" id="factor4-card">
                    <span>DV</span>
                    <span id="factor4-status">◉</span>
                </div>
                <div class="factor-card" id="factor-volume-card" style="display: none !important;">
                    <span>VL</span>

                </div>
                <div class="sma50-status" id="sma50-status">
                    <span>MA</span>

                </div>
                <div class="factor-card" id="factor1-card">
                    <span>MS</span>

                </div>
                <div class="factor-card" id="factor-ob-card">
                    <span>OB</span>
                    <span id="factor-ob-status">⏳</span>
                </div>
                <div class="factor-card" id="factor3-card">
                    <span>ADX</span>

                </div>
                <div class="decision-panel" id="decision-panel">
                    <div class="decision-text">
                        <span class="decision-label">DECISION:</span>
                        <span id="decision-status">ANALYZING...</span>
                        <span id="mode-indicator" class="mode-indicator">CONSERVATIVE</span>
                    </div>

                </div>
            </div>
            <div id="live-price" onclick="smartCopy('live-price')">0.00</div>
            
            <div class="rsi-panel">
                <div class="rsi-meta">
                    <div class="rsi-tag">RSI (14) REAL-TIME</div>

                <div class="rsi-track"><div id="rsi-bar"></div></div>

        </main>

        <section class="data-grid">
            <div class="data-item data-item-swing-left" id="swing-hl-container" onclick="copySwingHL()">
                <span class="data-label">SWING H/L</span>
                <div class="data-val" id="swing-value-container">
                    <span class="swing-high-text" id="swing-high-value">--</span>
                    <span class="swing-low-text" id="swing-low-value">--</span>
                </div>
            </div>
            <div class="data-item data-item-swing-center" id="sl-zone" onclick="smartCopy('sl-value')">
                <span class="data-label">SL (50%)</span>

            <div class="data-item data-item-entry-center" id="entry-zone" onclick="smartCopy('entry-zone')">

            <div class="data-item data-item-tp-right" onclick="smartCopy('rTP')">

</div>

<script>
(function() {
    'use strict';
    
    // ==================== VERSION ====================
    const VERSION = '20.0.0-OPTIMIZED-FINAL';
    console.log(`%c🚀 SMC APEX ${VERSION} | Null-Safe | Anti-Future-Leak | Optimized`, 'color: #00ff88; font-weight: bold;');
    
    // ==================== NULL-SAFE UTILITIES ====================
    const safeValue = (val, fallback = 0, context = '') => {
        if (val === null || val === undefined || typeof val !== 'number' || isNaN(val) || !isFinite(val)) {
            if (context) console.debug(`SMC APEX: Invalid value in ${context}, using fallback`, {val, fallback});
            return fallback;
        }
        return val;
    };
    
    const safeObject = (obj, path, fallback = 0) => {
        try {
            const keys = path.split('.');
            let current = obj;
            for (const key of keys) {
                if (current === null || current === undefined) return fallback;
                current = current[key];
            }
            return safeValue(current, fallback, path);
        } catch {
            return fallback;
        }
    };
    
    const safeArray = (arr) => Array.isArray(arr) ? arr : [];
    
    const safeNumberOperation = (numerator, denominator, fallback = 0) => {
        const num = safeValue(numerator, 0);
        const den = safeValue(denominator, 0);
        if (den === 0) return fallback;
        const result = num / den;
        return safeValue(result, fallback);
    };
    
    // ==================== KONFIGURASI ====================
    const ADX_DEFAULT_RANGING = 15;
    const DECISION_MODES = {
        CONSERVATIVE: 'conservative',
        SNIPER: 'sniper'
    };
    
    let currentMode = localStorage.getItem('decisionMode') || DECISION_MODES.CONSERVATIVE;
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsConnection = null;
    let lastPrice = 0;
    let candleData = [];

    function isAbnormalSpike(newPrice, oldPrice) {
        if (oldPrice <= 0) return false;
        const safeNew = safeValue(newPrice, 0);
        const safeOld = safeValue(oldPrice, 0);
        const change = Math.abs(safeNew - safeOld);
        const maxNormalChange = safeOld * (currentPair === "XAUUSDT" ? 0.01 : 0.03);
        const isAbnormal = change > maxNormalChange;
        
        if (isAbnormal) {
            abnormalPriceChangeCount++;
            console.warn(`⚠️ Abnormal spike detected: ${change.toFixed(2)} (${((change/safeOld)*100).toFixed(2)}%)`);
        } else {
            abnormalPriceChangeCount = Math.max(0, abnormalPriceChangeCount - 0.5);
        }
        
        return isAbnormal;
    }
    
    // ==================== REAL-TIME ORDER BLOCK (OPTIMIZED) ====================
    function detectOrderBlockRealtime(currentPrice, lastPriceVal, direction) {
        const safePrice = safeValue(currentPrice, 0);
        const safeLast = safeValue(lastPriceVal, 0);
        
        if (!candleData.length || candleData.length < 5) return null;
        if (Date.now() - lastOBDetectionTime < 500) return currentOrderBlock;
        
        const priceMove = Math.abs(safePrice - safeLast);
        const atr = calculateATR(14);
        const minMove = currentPair === "XAUUSDT" ? (atr * 0.05) : (atr * 0.03);
        
        if (priceMove < minMove) return currentOrderBlock;
        
        priceActionBuffer.push({ price: safePrice, time: Date.now(), direction: direction });
        if (priceActionBuffer.length > 20) priceActionBuffer.shift();
        
        if (priceActionBuffer.length >= 5) {
            const recentMoves = priceActionBuffer.slice(-5);
            const firstPrice = safeObject(priceActionBuffer[0], 'price', 0);
            const isImpulsive = recentMoves.every(m => {
                const movePrice = safeObject(m, 'price', 0);
                return (direction === "BULLISH" && movePrice > firstPrice) ||
                       (direction === "BEARISH" && movePrice < firstPrice);
            });
            
            if (isImpulsive && priceActionBuffer.length >= 10) {
                const lookback = priceActionBuffer.slice(-10, -5);
                if (lookback.length >= 3) {
                    const lastLookback = lookback[lookback.length-1];
                    const firstLookback = lookback[0];
                    const isSmallBody = Math.abs(safeObject(lastLookback, 'price', 0) - safeObject(firstLookback, 'price', 0)) < priceMove * 0.3;
                    
                    if (isSmallBody) {
                        lastOBDetectionTime = Date.now();
                        realtimeOBActive = true;
                        
                        return {
                            high: Math.max(...lookback.map(m => safeObject(m, 'price', 0))),
                            low: Math.min(...lookback.map(m => safeObject(m, 'price', 0))),
                            price: safeObject(lastLookback, 'price', 0),
                            type: direction === "BULLISH" ? "BULLISH_OB" : "BEARISH_OB",
                            strength: Math.min(3, priceMove / (atr * 0.5)),
                            realtime: true
                        };
                    }
                }
            }
        }
        
        return currentOrderBlock;
    }
    
    // OPTIMIZED: Batasi lookback ke 50 candle
    function detectOrderBlock(data, direction) {
        if (!data || data.length < 10) return null;
        
        const validData = data.filter(c => c && typeof c.h === 'number' && typeof c.l === 'number' && 
                                            typeof c.o === 'number' && typeof c.c === 'number');
        if (validData.length < 10) return null;
        
        const now = Date.now();
        if (now - lastOBUpdate < 2000 && currentOrderBlock && !currentOrderBlock.realtime) return currentOrderBlock;
        
        let bestOB = null;
        let bestStrength = 0;
        
        // OPTIMIZATION: Batasi loop ke 50 candle terakhir
        const OB_LOOKBACK = Math.min(50, validData.length);
        const startIdx = Math.max(10, validData.length - OB_LOOKBACK);
        
        for (let i = validData.length - 5; i >= startIdx; i--) {
            const current = validData[i];
            const next = validData[i + 1];
            const nextNext = validData[i + 2];
            
            if (!current || !next || !nextNext) continue;
            
            const bodySize = Math.abs(safeValue(current.c, 0) - safeValue(current.o, 0));
            const totalRange = safeValue(current.h, 0) - safeValue(current.l, 0);
            if (totalRange <= 0) continue;
            
            const bodyRatio = bodySize / totalRange;
            const isSmallBody = bodyRatio < 0.35;
            
            if ((direction === "BULLISH" || direction.includes("BULL")) && isSmallBody && 
                safeValue(current.c, 0) < safeValue(current.o, 0) && safeValue(next.c, 0) > safeValue(next.o, 0)) {
                const nextBodySize = Math.abs(safeValue(next.c, 0) - safeValue(next.o, 0));
                const nextRange = safeValue(next.h, 0) - safeValue(next.l, 0);
                const impulseStrength = nextRange > 0 ? nextBodySize / nextRange : 0;
                if (impulseStrength > 0.6) {
                    const strength = safeNumberOperation(nextBodySize, totalRange, 0) * (safeValue(next.c, 0) > safeObject(nextNext, 'c', 0) ? 1.2 : 1.0);
                    if (strength > bestStrength) {
                        bestStrength = strength;
                        bestOB = {
                            high: safeValue(current.h, 0),
                            low: safeValue(current.l, 0),
                            price: safeValue(current.o, 0),
                            type: "BULLISH_OB",
                            strength: strength,
                            realtime: false
                        };
                    }
                }
            }
            
            if ((direction === "BEARISH" || direction.includes("BEAR")) && isSmallBody && 
                safeValue(current.c, 0) > safeValue(current.o, 0) && safeValue(next.c, 0) < safeValue(next.o, 0)) {
                const nextBodySize = Math.abs(safeValue(next.o, 0) - safeValue(next.c, 0));
                const nextRange = safeValue(next.h, 0) - safeValue(next.l, 0);
                const impulseStrength = nextRange > 0 ? nextBodySize / nextRange : 0;
                if (impulseStrength > 0.6) {
                    const strength = safeNumberOperation(nextBodySize, totalRange, 0) * (safeValue(next.c, 0) < safeObject(nextNext, 'c', 0) ? 1.2 : 1.0);
                    if (strength > bestStrength) {
                        bestStrength = strength;
                        bestOB = {
                            high: safeValue(current.h, 0),
                            low: safeValue(current.l, 0),
                            price: safeValue(current.c, 0),
                            type: "BEARISH_OB",
                            strength: strength,
                            realtime: false
                        };
                    }
                }
            }
        }
        
        if (bestOB && bestStrength > 1.2) {
            currentOrderBlock = bestOB;
            lastOBUpdate = now;
            return bestOB;
        }
        
        return null;
    }

    // ==================== REAL-TIME DIVERGENCE (FIXED - NO FUTURE LEAK) ====================
    function calculateRealtimeRSI(prices, period = 14) {
        if (prices.length < period + 1) return 50;
        
        let gains = 0, losses = 0;
        for (let i = prices.length - period; i < prices.length; i++) {
            const diff = safeValue(prices[i], 0) - safeValue(prices[i-1], 0);
            if (diff >= 0) gains += diff;
            else losses += Math.abs(diff);
        }
        
        const avgGain = gains / period;
        const avgLoss = losses / period;
        
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return 100 - (100 / (1 + rs));
    }
    
    // FIXED: Tidak ada future leak - mencari indeks PERTAMA (bukan terakhir)
    function detectRealtimeDivergence(prices, rsiValues) {
        if (prices.length < 30 || rsiValues.length < 30) return { type: "NONE", strength: 0 };
        
        const recentPrices = prices.slice(-20);
        const recentRSI = rsiValues.slice(-20);
        
        // Cari indeks pertama untuk harga terendah (tidak ada future leak)
        let priceLowIdx = 0;
        let minPrice = Infinity;
        for (let i = 0; i < recentPrices.length; i++) {
            const price = safeValue(recentPrices[i], 0);
            if (price < minPrice) {
                minPrice = price;
                priceLowIdx = i;
            }
        }
        
        // Cari indeks pertama untuk harga tertinggi (tidak ada future leak)
        let priceHighIdx = 0;
        let maxPrice = -Infinity;
        for (let i = 0; i < recentPrices.length; i++) {
            const price = safeValue(recentPrices[i], 0);
            if (price > maxPrice) {
                maxPrice = price;
                priceHighIdx = i;
            }
        }
        
        const rsiAtLow = safeValue(recentRSI[priceLowIdx], 50);
        const rsiAtHigh = safeValue(recentRSI[priceHighIdx], 50);
        
        const prevPrices = prices.slice(-30, -20);
        const prevRSI = rsiValues.slice(-30, -20);
        
        if (prevPrices.length > 0) {
            const prevLow = Math.min(...prevPrices.map(p => safeValue(p, 0)));
            const prevHigh = Math.max(...prevPrices.map(p => safeValue(p, 0)));
            const lastPrevRSI = safeValue(prevRSI[prevRSI.length-1], 50);
            
            if (minPrice < prevLow && rsiAtLow > lastPrevRSI) {
                const strength = Math.min(100, (rsiAtLow - 25) * 2.5);
                if (strength > 20) {
                    return { type: "BULLISH", strength: strength, isRealtime: true };
                }
            }
            
            if (maxPrice > prevHigh && rsiAtHigh < lastPrevRSI) {
                const strength = Math.min(100, (75 - rsiAtHigh) * 2.5);
                if (strength > 20) {
                    return { type: "BEARISH", strength: strength, isRealtime: true };
                }
            }
        }
        
        return { type: "NONE", strength: 0 };
    }
    
    function updateDivergenceRealtime(currentPrice) {
        if (currentPair !== "XAUUSDT") return false;
        
        const now = Date.now();
        if (now - lastDivergenceCheck < 300) return false;
        lastDivergenceCheck = now;
        
        const safePrice = safeValue(currentPrice, 0);
        realtimePriceBuffer.push(safePrice);
        if (realtimePriceBuffer.length > 50) realtimePriceBuffer.shift();
        
        if (realtimePriceBuffer.length >= 20) {
            const realtimeRSI = calculateRealtimeRSI(realtimePriceBuffer, 14);
            realtimeRSIBuffer.push(realtimeRSI);
            if (realtimeRSIBuffer.length > 50) realtimeRSIBuffer.shift();
            
            const divergence = detectRealtimeDivergence(realtimePriceBuffer, realtimeRSIBuffer);
            
            if (divergence.type !== "NONE" && divergence.strength > 25 && now > divergenceCooldown) {
                pendingDivergence = divergence;

    // ==================== SNIPER ENTRY SETUP ====================
    function evaluateSniperEntry(currentPrice) {
        const safePrice = safeValue(currentPrice, 0);
        const levels = [];
        const tolerance = currentPair === "XAUUSDT" ? 0.5 : 50;
        
        if (currentOrderBlock) {
            const obPrice = safeObject(currentOrderBlock, 'price', 0);
            levels.push({ 
                price: obPrice, 
                type: "OB", 
                weight: 3,
                desc: `OB @ ${obPrice.toFixed(getPrecision())}`
            });
        }
        
        if (engine.f618 > 0 && engine.deep > 0) {
            const fvgMid = (engine.f618 + engine.deep) / 2;
            levels.push({ 
                price: fvgMid, 
                type: "FVG", 
                weight: 2,
                desc: `FVG Mid @ ${fvgMid.toFixed(getPrecision())}`
            });
        }
        
        if (engine.f618 > 0) {
            levels.push({ 
                price: engine.f618, 
                type: "FIB618", 
                weight: 2,
                desc: `Fib 61.8% @ ${engine.f618.toFixed(getPrecision())}`
            });
        }
        
        if (engine.deep > 0) {
            levels.push({ 
                price: engine.deep, 
                type: "FIB786", 
                weight: 2,
                desc: `Fib 78.6% @ ${engine.deep.toFixed(getPrecision())}`
            });
        }
        
        const prevSwing = engine.bias.includes("BULL") ? engine.lastSwingLow : engine.lastSwingHigh;
        if (prevSwing > 0) {
            levels.push({ 
                price: prevSwing, 
                type: "SWING", 
                weight: 2,
                desc: `Prev Swing @ ${prevSwing.toFixed(getPrecision())}`
            });
        }
        
        if (engine.sma20 > 0) {
            levels.push({ 
                price: engine.sma20, 
                type: "SMA20", 
                weight: 1,
                desc: `SMA20 @ ${engine.sma20.toFixed(getPrecision())}`
            });
        }
        
        const clusters = [];
        const used = new Set();
        
        for (let i = 0; i < levels.length; i++) {
            if (used.has(i)) continue;
            
            const cluster = {
                levels: [levels[i]],
                totalWeight: levels[i].weight,
                price: levels[i].price,
                descriptions: [levels[i].desc]
            };
            used.add(i);
            
            for (let j = i + 1; j < levels.length; j++) {
                if (used.has(j)) continue;
                
                if (Math.abs(levels[i].price - levels[j].price) <= tolerance) {
                    cluster.levels.push(levels[j]);
                    cluster.totalWeight += levels[j].weight;
                    cluster.descriptions.push(levels[j].desc);
                    cluster.price = (cluster.price * (cluster.levels.length - 1) + levels[j].price) / cluster.levels.length;
                    used.add(j);
                }
            }
            
            clusters.push(cluster);
        }
        
        clusters.sort((a, b) => b.totalWeight - a.totalWeight);
        sniperLevels = clusters;
        
        const bestCluster = clusters[0];
        
        if (bestCluster && bestCluster.totalWeight >= 5) {
            const isPriceNearCluster = Math.abs(safePrice - bestCluster.price) <= tolerance * 2;
            
            return {
                isValid: true,
                entryPrice: bestCluster.price,
                confidence: bestCluster.totalWeight,
                confluenceLevels: bestCluster.descriptions,
                sniperQuality: bestCluster.totalWeight >= 7 ? "GOLDEN" : "SILVER",
                isPriceNear: isPriceNearCluster,
                cluster: bestCluster
            };
        }
        
        return { isValid: false, confidence: 0 };
    }

        try {
            const resp = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');

            const symbolInfo = data.symbols.find(s => s.symbol === currentPair);

                const precision = Math.max(0, Math.round(Math.abs(Math.log10(tickSize))));
                cachedPrecision = precision;
                precisionCacheTime = now;
                return precision;
            }
        } catch(e) {}
        
        const fallback = currentPair === "XAUUSDT" ? 2 : 1;
        cachedPrecision = fallback;
        precisionCacheTime = now;
        return fallback;
    }

    function calculateATR(period = 14, data = candleData) {
        const now = Date.now();
        if (now - lastATRCalc < 100 && cachedATR > 0) return cachedATR;
        if (!data.length || data.length < period + 1) return 0;
        
        const dataSlice = data.slice(-period - 1);
        let tr = [];
        for (let i = 1; i < dataSlice.length; i++) {
            const trueRange = Math.max(
                safeValue(dataSlice[i].h, 0) - safeValue(dataSlice[i].l, 0), 
                Math.abs(safeValue(dataSlice[i].h, 0) - safeValue(dataSlice[i-1].c, 0)), 
                Math.abs(safeValue(dataSlice[i].l, 0) - safeValue(dataSlice[i-1].c, 0))
            );
            tr.push(trueRange);
        }
        cachedATR = tr.slice(-period).reduce((a, b) => a + b, 0) / period;
        lastATRCalc = now;
        return safeValue(cachedATR, 0);
    }

    function detectFractalSwingPoints(data, lookback = 5) {
        if (!data || data.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        const validData = data.filter(c => c && typeof c.h === 'number' && typeof c.l === 'number');
        if (validData.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        let swingHigh = 0, swingLow = Infinity;
        for (let i = lookback; i < validData.length - lookback; i++) {
            let isSwingHigh = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && safeValue(validData[j].h, 0) >= safeValue(validData[i].h, 0)) { 
                    isSwingHigh = false; break; 
                }
            }
            let isSwingLow = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && safeValue(validData[j].l, 0) <= safeValue(validData[i].l, 0)) { 
                    isSwingLow = false; break; 
                }
            }
            if (isSwingHigh && safeValue(validData[i].h, 0) > swingHigh) swingHigh = safeValue(validData[i].h, 0);
            if (isSwingLow && safeValue(validData[i].l, 0) < swingLow) swingLow = safeValue(validData[i].l, 0);
        }
        if (swingHigh === 0) swingHigh = Math.max(...validData.map(c => safeValue(c.h, 0)));
        if (swingLow === Infinity) swingLow = Math.min(...validData.map(c => safeValue(c.l, 0)));
        return { swingHigh, swingLow };
    }
    
    function detectSwingPointsWithMinRange(data, lookback = 5) {
        let fractalPoints = detectFractalSwingPoints(data, lookback);
        let swingHigh = fractalPoints.swingHigh, swingLow = fractalPoints.swingLow;
        let minRange;
        if (currentPair === "XAUUSDT") {
            switch(currentTF) {
                case "5m": minRange = 2.5; break;
                case "15m": minRange = 5.0; break;
                case "1h": minRange = 8.0; break;
                case "4h": minRange = 12.0; break;
                default: minRange = 5.0;
            }
        } else {
            switch(currentTF) {
                case "5m": minRange = 250; break;
                case "15m": minRange = 500; break;
                case "1h": minRange = 800; break;
                case "4h": minRange = 1200; break;
                default: minRange = 500;
            }
        }
        let range = swingHigh - swingLow;
        if (range < minRange && data.length > lookback * 4) {
            const extendedLookback = Math.min(lookback * 2, 10);
            const extendedSlice = data.slice(-Math.min(data.length, Math.floor(data.length * 0.8)));
            const extendedPoints = detectFractalSwingPoints(extendedSlice, extendedLookback);
            const extendedRange = extendedPoints.swingHigh - extendedPoints.swingLow;
            if (extendedRange > range && extendedRange >= minRange) {
                swingHigh = extendedPoints.swingHigh;
                swingLow = extendedPoints.swingLow;
            }
        }
        return { swingHigh, swingLow, range: swingHigh - swingLow };
    }
    
    function detectCandleImbalance(data) {
        if (!data.length || data.length < 3) return null;
        const lastThree = data.slice(-3);
        for (let i = 0; i < lastThree.length - 1; i++) {
            const curr = lastThree[i], next = lastThree[i + 1];
            if (safeValue(next.l, 0) > safeValue(curr.h, 0)) return { type: "BULLISH", price: safeValue(curr.h, 0) };
            if (safeValue(next.h, 0) < safeValue(curr.l, 0)) return { type: "BEARISH", price: safeValue(curr.l, 0) };
        }
        return null;
    }
    
    function getFVGMitigationDepthAdvanced(swingHigh, swingLow, currentPrice, candleData) {
        const safePrice = safeValue(currentPrice, 0);
        const imbalance = detectCandleImbalance(candleData);
        const range = swingHigh - swingLow;
        if (range <= 0) return 50;
        if (!imbalance) {
            const depth = ((safePrice - swingLow) / range) * 100;
            return Math.min(100, Math.max(0, depth));
        }
        const distanceToImbalance = Math.abs(safePrice - imbalance.price);
        const maxDistance = range * 0.15;
        const mitigation = Math.min(100, Math.max(0, (1 - distanceToImbalance / maxDistance) * 100));
        return imbalance.type === "BULLISH" ? mitigation : 100 - mitigation;
    }
    
    function isFVGReady(depth, isBullish, candleData) {
        const minDepth = 30;
        const imbalance = detectCandleImbalance(candleData);
        if (imbalance && imbalance.type === (isBullish ? "BULLISH" : "BEARISH")) return depth >= 20;
        return isBullish ? depth >= minDepth : (100 - depth) >= minDepth;
    }

    // ==================== SMC CALCULATION ====================
    function calculateSMCLevels() {
        const now = Date.now();
        if (now - lastSMCUpdate < SMC_UPDATE_INTERVAL && engine.swingHigh > 0) {
            return;
        }
        lastSMCUpdate = now;
        
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = getLookback();
        const fractalLookback = getFractalLookback();
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const swingPoints = detectSwingPointsWithMinRange(slice, fractalLookback);
        engine.swingHigh = swingPoints.swingHigh;
        engine.swingLow = swingPoints.swingLow;
        const range = engine.swingHigh - engine.swingLow;
        if (range <= 0) return;
        resetSweepIfStructureChanged();
        const lastCandlePrice = safeObject(candleData[candleData.length-1], 'c', lastPrice);
        if (!engine.bosConfirmed) engine.bias = lastCandlePrice > (engine.swingHigh + engine.swingLow)/2 ? "BULLISH" : "BEARISH";
        const isBullish = engine.bias === "BULLISH" || engine.bias === "BULLISH_BOS";
        if (isBullish) {
            engine.f618 = engine.swingLow + range * 0.618;
            engine.deep = engine.swingLow + range * 0.786;
            engine.tp = engine.swingHigh + range * 0.27;
            const entryZoneMid = (engine.f618 + engine.deep) / 2;
            const distanceToTP = Math.abs(engine.tp - entryZoneMid);
            engine.sl = entryZoneMid - (distanceToTP * 0.5);
            if (engine.sl < engine.swingLow) engine.sl = engine.swingLow;
        } else {
            engine.f618 = engine.swingHigh - range * 0.618;
            engine.deep = engine.swingHigh - range * 0.786;
            engine.tp = engine.swingLow - range * 0.27;
            const entryZoneMid = (engine.f618 + engine.deep) / 2;
            const distanceToTP = Math.abs(entryZoneMid - engine.tp);
            engine.sl = entryZoneMid + (distanceToTP * 0.5);
            if (engine.sl > engine.swingHigh) engine.sl = engine.swingHigh;
        }
        const prec = getPrecision();
        document.getElementById('swing-high-value').innerText = engine.swingHigh.toFixed(prec);
        document.getElementById('swing-low-value').innerText = engine.swingLow.toFixed(prec);
        document.getElementById('r618').innerText = engine.f618.toFixed(prec);
        document.getElementById('r786').innerText = engine.deep.toFixed(prec);
        document.getElementById('rTP').innerText = engine.tp.toFixed(prec);
        document.getElementById('sl-value').innerText = engine.sl.toFixed(prec);
        updatePipsDisplay();
    }

    // ==================== FACTOR FUNCTIONS ====================
    function detectLiquiditySweep(price) {
        if (!engine.swingHigh || !engine.swingLow) return { swept: false, side: null };
        const safePrice = safeValue(price, 0);
        const buffer = getSweepBuffer();
        const cooldown = getSweepCooldown();
        const now = Date.now();
        
        if (spikeDetected && (now - lastSpikeTime) < SPIKE_COOLDOWN) {
            return { swept: false, side: null };
        }
        
        if (safePrice > engine.swingHigh + buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            if (!isValidSweep(safePrice, "SELL")) return { swept: false, side: null };
            engine.sweepDetected = true; engine.liquiditySide = "SELL"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return { swept: true, side: "SELL" };
        } else if (safePrice < engine.swingLow - buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            if (!isValidSweep(safePrice, "BUY")) return { swept: false, side: null };
            engine.sweepDetected = true; engine.liquiditySide = "BUY"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return { swept: true, side: "BUY" };
        }
        return { swept: false, side: null };
    }
    
    function confirmBOS(currentPrice) {
        if (!engine.sweepDetected || engine.bosConfirmed) return false;
        const safePrice = safeValue(currentPrice, 0);
        const now = Date.now();
        if (engine.liquiditySide === "BUY" && safePrice > engine.swingHigh) {
            engine.bosConfirmed = true; engine.bias = "BULLISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true; highlightFVGEntry(); 
            highlightOBEntry();
            return true;
        } else if (engine.liquiditySide === "SELL" && safePrice < engine.swingLow) {
            engine.bosConfirmed = true; engine.bias = "BEARISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true; highlightFVGEntry(); 
            highlightOBEntry();
            return true;
        }
        return false;
    }

    function calculateADXWithTick(currentPrice) {
        const now = Date.now();
        if (now - cachedADX.timestamp < ADX_CACHE_DURATION && cachedADX.value > 0) {
            return cachedADX.value;
        }
        
        if (!candleData.length || candleData.length < 28) return ADX_DEFAULT_RANGING;
        try {
            const period = 14;
            const data = [...candleData];
            if (data.length < period + 1) return ADX_DEFAULT_RANGING;
            let tr = [], plusDM = [], minusDM = [];
            for (let i = 1; i < data.length; i++) {
                const high = safeObject(data[i], 'h', 0);
                const low = safeObject(data[i], 'l', 0);
                const prevHigh = safeObject(data[i-1], 'h', 0);
                const prevLow = safeObject(data[i-1], 'l', 0);
                const prevClose = safeObject(data[i-1], 'c', 0);
                const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                tr.push(trueRange);
                const upMove = high - prevHigh;
                const downMove = prevLow - low;
                if (upMove > downMove && upMove > 0) { plusDM.push(upMove); minusDM.push(0); }
                else if (downMove > upMove && downMove > 0) { plusDM.push(0); minusDM.push(downMove); }
                else { plusDM.push(0); minusDM.push(0); }
            }
            const lastCandle = data[data.length - 1];
            const safeCurrentPrice = safeValue(currentPrice, 0);
            const currentHigh = Math.max(safeObject(lastCandle, 'h', 0), safeCurrentPrice);
            const currentLow = Math.min(safeObject(lastCandle, 'l', 0), safeCurrentPrice);
            const prevClose = safeObject(lastCandle, 'c', 0);
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            const tickUpMove = currentHigh - safeObject(lastCandle, 'h', 0);
            const tickDownMove = safeObject(lastCandle, 'l', 0) - currentLow;
            if (tickUpMove > tickDownMove && tickUpMove > 0) { plusDM.push(tickUpMove); minusDM.push(0); }
            else if (tickDownMove > tickUpMove && tickDownMove > 0) { plusDM.push(0); minusDM.push(tickDownMove); }
            else { plusDM.push(0); minusDM.push(0); }
            if (tr.length < period) return ADX_DEFAULT_RANGING;
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            smoothedTR /= period;
            smoothedPlusDM /= period;
            smoothedMinusDM /= period;
            
            // FIXED: Hindari pembagian nol
            const plusDI = smoothedTR > 0 ? (smoothedPlusDM / smoothedTR) * 100 : 0;
            const minusDI = smoothedTR > 0 ? (smoothedMinusDM / smoothedTR) * 100 : 0;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            engine.plusDI = plusDI;
            engine.minusDI = minusDI;
            const result = Math.min(100, Math.max(0, isNaN(dx) ? ADX_DEFAULT_RANGING : dx));
            cachedADX = { value: result, timestamp: now };
            return result;
        } catch (error) { 
            console.warn('ADX calculation error:', error);
            return ADX_DEFAULT_RANGING; 
        }
    }

    function computeRSI(currentPrice) {
        if (!candleData.length || candleData.length < 20) return 50;
        const period = 14;
        let closes = candleData.map(c => safeObject(c, 'c', 0));
        const safeCurrentPrice = safeValue(currentPrice, 0);
        if (closes.length > 0 && safeCurrentPrice !== closes[closes.length - 1]) closes.push(safeCurrentPrice);
        if (closes.length < period + 1) return 50;
        let gains = [], losses = [];
        for (let i = 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff >= 0) { gains.push(diff); losses.push(0); }
            else { gains.push(0); losses.push(Math.abs(diff)); }
        }
        let avgGain = 0, avgLoss = 0;
        for (let i = 0; i < period; i++) { avgGain += gains[i]; avgLoss += losses[i]; }
        avgGain /= period; avgLoss /= period;
        for (let i = period; i < gains.length; i++) {
            avgGain = ((avgGain * (period - 1)) + gains[i]) / period;
            avgLoss = ((avgLoss * (period - 1)) + losses[i]) / period;
        }
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return Math.min(100, Math.max(0, 100 - (100 / (1 + rs))));
    }

    function detectCandlestickPattern() {
        if (!candleData.length || candleData.length < 5) return "NONE";
        const lastCandle = candleData[candleData.length - 1];
        const prevCandle = candleData[candleData.length - 2];
        const lastClose = safeObject(lastCandle, 'c', 0);
        const lastOpen = safeObject(lastCandle, 'o', 0);
        const lastHigh = safeObject(lastCandle, 'h', 0);
        const lastLow = safeObject(lastCandle, 'l', 0);
        const prevClose = safeObject(prevCandle, 'c', 0);
        const prevOpen = safeObject(prevCandle, 'o', 0);
        const prevHigh = safeObject(prevCandle, 'h', 0);
        const prevLow = safeObject(prevCandle, 'l', 0);
        
        const body = Math.abs(lastClose - lastOpen);
        const upperWick = lastHigh - Math.max(lastClose, lastOpen);
        const lowerWick = Math.min(lastClose, lastOpen) - lastLow;
        const totalRange = lastHigh - lastLow;
        let pattern = "NONE";
        if (totalRange > 0) {
            const upperWickPercent = upperWick / totalRange;
            const lowerWickPercent = lowerWick / totalRange;
            const bodyPercent = body / totalRange;
            if (upperWickPercent > 0.6 && bodyPercent < 0.3) pattern = "PIN_BAR_BEARISH";
            else if (lowerWickPercent > 0.6 && bodyPercent < 0.3) pattern = "PIN_BAR_BULLISH";
        }
        if (prevCandle && lastCandle) {
            const prevBullish = prevClose > prevOpen;
            const currentBullish = lastClose > lastOpen;
            if (!prevBullish && currentBullish && lastClose > prevHigh && lastOpen < prevLow) pattern = "BULLISH_ENGULFING";
            else if (prevBullish && !currentBullish && lastClose < prevLow && lastOpen > prevHigh) pattern = "BEARISH_ENGULFING";
        }
        if (prevCandle && lastCandle) {
            if (lastHigh < prevHigh && lastLow > prevLow) pattern = pattern === "NONE" ? "INSIDE_BAR" : pattern;
        }
        wysetrade.candlePattern = pattern;
        const isBullishSetup = (engine.bias === "BULLISH" || engine.bias === "BULLISH_BOS");
        const isBearishSetup = (engine.bias === "BEARISH" || engine.bias === "BEARISH_BOS");
        let isValid = false;
        if (isBullishSetup && (pattern === "PIN_BAR_BULLISH" || pattern === "BULLISH_ENGULFING")) isValid = true;
        else if (isBearishSetup && (pattern === "PIN_BAR_BEARISH" || pattern === "BEARISH_ENGULFING")) isValid = true;
        else if (pattern === "INSIDE_BAR") isValid = true;
        wysetrade.isValidCandle = isValid;
        return isValid;
    }

        let isBlackout = false, reason = "";
        for (const news of upcomingNews) {
            const newsTime = news.time;
            const startBlackout = newsTime - (30 * 60 * 1000);
            const endBlackout = newsTime + (30 * 60 * 1000);
            if (now >= startBlackout && now <= endBlackout) {
                isBlackout = true;
                reason = `⛔ ${news.title.toUpperCase()} (${Math.ceil((endBlackout - now) / 60000)}m left)`;
                break;
            }
        }
        isNewsBlackout = isBlackout;
        newsBlackoutReason = reason;
        const newsStatusElem = document.getElementById('news-status');
        if (newsStatusElem) {
            if (isNewsBlackout) {
                newsStatusElem.style.display = "inline-flex";
                newsStatusElem.innerHTML = `${reason}`;

                               (engine.bias === "BULLISH_BOS" && !isArrowBearish);
        const isBearishSetup = (isMTFBearish && (isArrowBearish || (isArrowNeutral && engine.bias.includes("BEAR")))) || 
                               (engine.bias === "BEARISH_BOS" && !isArrowBullish);
        
        const isDirectionValid = (isBullishSetup || isBearishSetup) && isStructureValid;
        const isFVGReadyFlag = isFVGReady(fvgDepth, isBullishSetup || isBearishSetup, candleData);
        const isSweepActive = engine.sweepDetected && !engine.bosConfirmed;
        const isBOSConfirmed = engine.bosConfirmed && engine.fvgEntryActive;
        const throttleCheck = isThrottled(currentPair, currentTF);
        
        const sniperEval = currentMode === DECISION_MODES.SNIPER ? evaluateSniperEntry(safePrice) : null;
        
        const minScore = currentMode === DECISION_MODES.CONSERVATIVE ? 7 : 
                        (sniperEval?.sniperQuality === "GOLDEN" ? 6 : 8);
        const isScoreValid = score >= minScore;
        const isValidPosition = isPriceInZone || hasSignificantMove || 
                               (currentMode === DECISION_MODES.SNIPER && sniperEval?.isPriceNear);
        
        const isBTCVolumeOk = isBTCVolumeValid();
        if (currentPair === "BTCUSDT" && !isBTCVolumeOk && !isInTrade) {
            decisionElem.innerHTML = `LOW VOLUME (<1.5x) ${scoreText}`;
            decisionElem.style.color = "var(--bloomberg-orange)";
            decisionElem.style.background = "rgba(255, 136, 77, 0.1)";
            return;
        }
        
        let decision = "", decisionColor = "", decisionBg = "", shouldSignal = false;
        
        if (throttleCheck.throttled && !lastSignalDecision) {
            const remaining = throttleCheck.remaining;
            const secRemain = remaining % 60;
            const minRemain = Math.floor(remaining / 60);
            decision = `THROTTLED (${minRemain}m ${secRemain}s) ${scoreText}`;
            decisionColor = "var(--bloomberg-orange)"; 
            decisionBg = "rgba(255, 136, 77, 0.15)";
        } else if (spikeDetected && (now - lastSpikeTime) < SPIKE_COOLDOWN) {
            decision = `⚠️ FALSE SPIKE DETECTED ${scoreText}`;
            decisionColor = "var(--bloomberg-danger)"; 
            decisionBg = "rgba(255, 51, 102, 0.15)";
        } else if (!isStructureValid) {
            decision = `NEED STRUCTURE ${scoreText}`;
            decisionColor = "var(--bloomberg-gold)"; 
            decisionBg = "rgba(255, 204, 0, 0.1)";
        } else if (isSweepActive && !isBOSConfirmed) {
            decision = `WAITING BOS ${scoreText}`;
            decisionColor = "var(--bloomberg-orange)"; 
            decisionBg = "rgba(255, 136, 77, 0.1)";
        } else if (isBOSConfirmed && !isPriceInZone && currentMode === DECISION_MODES.CONSERVATIVE) {
            decision = `WAITING ENTRY ZONE ${scoreText}`;
            decisionColor = "var(--bloomberg-gold)"; 
            decisionBg = "rgba(255, 204, 0, 0.1)";
        } else if (!isScoreValid) {
            const need = minScore - score;
            decision = `NEED ${need} MORE FACTOR${need > 1 ? 'S' : ''} ${scoreText}`;
            decisionColor = "var(--bloomberg-gold)"; 
            decisionBg = "rgba(255, 204, 0, 0.1)";
        } else if (!isFVGReadyFlag && currentMode === DECISION_MODES.CONSERVATIVE) {
            const needed = 30;
            const currentFVG = isBullishSetup ? fvgDepth : (100 - fvgDepth);
            decision = `FVG: ${Math.round(currentFVG)}%/${needed}% ${scoreText}`;
            decisionColor = "var(--bloomberg-orange)"; 
            decisionBg = "rgba(255, 136, 77, 0.15)";
        } else if (currentMode === DECISION_MODES.SNIPER && !sniperEval?.isValid) {
            decision = `NO SNIPER CONFLUENCE ${scoreText}`;
            decisionColor = "var(--bloomberg-purple)"; 
            decisionBg = "rgba(170, 102, 255, 0.1)";
        } else if (isRanging && !hasSignificantMove) {
            decision = `LOW VOLATILITY ${scoreText}`;
            decisionColor = "var(--bloomberg-text-dim)"; 
            decisionBg = "rgba(170, 170, 170, 0.05)";
        } else if (!isValidPosition) {
            decision = `WAIT ENTRY ZONE ${scoreText}`;
            decisionColor = "var(--bloomberg-gold)"; 
            decisionBg = "rgba(255, 204, 0, 0.1)";
        } else if (!isMTFActive && !isSweepActive) {
            decision = `MTF NO CONFLUENCE ${scoreText}`;
            decisionColor = "var(--bloomberg-gold)"; 
            decisionBg = "rgba(255, 204, 0, 0.1)";
        } else if (!isTrendStrong && !hasSignificantMove) {
            decision = `WEAK TREND (${Math.round(engine.adx)}) ${scoreText}`;
            decisionColor = "var(--bloomberg-text-dim)"; 
            decisionBg = "rgba(170, 170, 170, 0.05)";
        } else if (isStructureValid && (isTrendStrong || hasSignificantMove) && !isRanging && isValidPosition && isScoreValid && !throttleCheck.throttled && (isMTFActive || isSweepActive || isBOSConfirmed) && isDirectionValid) {
            
            if (currentMode === DECISION_MODES.SNIPER && sniperEval?.isValid) {
                shouldSignal = true;
                const quality = sniperEval.sniperQuality;
                const direction = isBullishSetup ? "BUY" : "SELL";
                decision = `🎯 SNIPER ${direction} [${quality}] ${scoreText}`;
                decisionColor = "var(--bloomberg-purple)";
                decisionBg = "rgba(170, 102, 255, 0.15)";
            } else if (isBullishSetup) {
                shouldSignal = true;
                decision = `✅ BUY NOW! ${scoreText}`;
                if (activeFactors.length) decision += ` [${activeFactors.slice(0, 4).join("/")}]`;
                decisionColor = "var(--bloomberg-accent)";
                decisionBg = "rgba(0, 255, 136, 0.15)";
            } else if (isBearishSetup) {
                shouldSignal = true;
                decision = `🔻 SELL NOW! ${scoreText}`;
                if (activeFactors.length) decision += ` [${activeFactors.slice(0, 4).join("/")}]`;
                decisionColor = "var(--bloomberg-danger)";
                decisionBg = "rgba(255, 51, 102, 0.15)";
            }
        } else {
            decision = `NO SETUP ${scoreText}`;
            decisionColor = "var(--bloomberg-text-dim)";
            decisionBg = "rgba(170, 170, 170, 0.05)";
        }
        
        if (shouldSignal) {
            lastSignalExpiry = now + (THROTTLE_MINUTES * 60 * 1000);
            lastSignalDecision = decision;
            updateThrottle(currentPair, currentTF);
            decisionElem.innerHTML = decision;
            decisionElem.style.color = decisionColor;
            decisionElem.style.background = decisionBg;
            decisionElem.classList.add('decision-animate');
            setTimeout(() => decisionElem.classList.remove('decision-animate'), 800);
            trackTradeEntry(decision, safePrice);
            return;
        }
        decisionElem.innerHTML = decision;
        decisionElem.style.color = decisionColor;
        decisionElem.style.background = decisionBg;
        trackTradeEntry(decision, safePrice);
    }

    function checkMajorStructureChange(currentPrice) {
        if (!candleData.length || candleData.length < 30) return false;
        const now = Date.now();
        let majorChange = false, changeReason = "";
        const oldBias = engine.bias;
        const safePrice = safeValue(currentPrice, 0);
        const lastCandleClose = safeObject(candleData[candleData.length - 1], 'c', safePrice);
        const midPoint = (engine.swingHigh + engine.swingLow) / 2;
        const newBias = lastCandleClose > midPoint ? "BULLISH" : "BEARISH";
        if (oldBias !== newBias && oldBias !== "NEUTRAL" && newBias !== "NEUTRAL" && !oldBias.includes("BOS")) {
            majorChange = true; changeReason = `BIAS CHANGE: ${oldBias} → ${newBias}`;
        }
        const oldRange = engine.lastSwingHigh - engine.lastSwingLow;
        const newRange = engine.swingHigh - engine.swingLow;
        if (oldRange > 0 && newRange > 0) {
            const rangeChangePercent = Math.abs((newRange - oldRange) / oldRange) * 100;
            if (rangeChangePercent > 30) { majorChange = true; changeReason = `RANGE CHANGE: ${rangeChangePercent.toFixed(1)}%`; }
        }
        if (majorChange && (now - lastResetTime) > RESET_COOLDOWN) { 
            setTimeout(() => fullStructureReset(changeReason), 300); 
            return true; 
        }
        return false;
    }
    
    function checkAndUpdateStructure(currentPrice) {
        if (!candleData.length || candleData.length < 30) return;
        const now = Date.now();
        let structureChanged = false;
        const safePrice = safeValue(currentPrice, 0);
        if (safePrice > engine.swingHigh && safePrice > engine.lastSwingHigh) structureChanged = true;
        if (safePrice < engine.swingLow && safePrice < engine.lastSwingLow) structureChanged = true;
        if (structureChanged && (now - lastStructureUpdateTime) > 3000) { 
            lastStructureUpdateTime = now; 
            forceRecalculateStructure(); 
        }
    }
    
    function updateWSStatus(status, message) {
        const dot = document.getElementById('ws-status-dot');
        const text = document.getElementById('ws-status-text');
        if (!dot || !text) return;
        
        dot.className = 'ws-status-dot';
        
        if (status === 'live') {
            dot.classList.add('live');
            text.innerText = message || 'LIVE';
            reconnectDelay = 1000;
            isUsingFallback = false;
            isDataStale = false;
        } else if (status === 'connecting') {
            dot.classList.add('connecting');
            text.innerText = message || 'CONNECTING';
        } else if (status === 'reconnect') {
            dot.classList.add('reconnect');
            text.innerText = message || 'RECONNECT';
        } else if (status === 'fallback') {
            dot.classList.add('fallback');
            text.innerText = message || 'FALLBACK';
            isUsingFallback = true;
        } else if (status === 'stale') {
            dot.classList.add('stale');
            text.innerText = message || 'DATA STALE';
            isDataStale = true;
        } else {
            dot.classList.add('reconnect');
            text.innerText = message || 'RECONNECT';
        }
        
        const decisionPanel = document.getElementById('decision-panel');
        if (decisionPanel) {
            if (isDataStale) {
                decisionPanel.classList.add('stale-warning');
            } else {
                decisionPanel.classList.remove('stale-warning');
            }
        }
    }
    
    // ==================== WEBSOCKET ====================
    function initWebSocket() {
        cleanupWebSocket();
        updateWSStatus('connecting', 'CONNECTING');
        const wsUrl = `wss://fstream.binance.com/ws/${currentPair.toLowerCase()}@aggTrade`;
        wsConnection = new WebSocket(wsUrl);
        wsConnection.onopen = () => { 
            reconnectDelay = 1000; 
            lastWSMessageTime = Date.now(); 
            lastPriceUpdateTime = Date.now();
            if (isUsingFallback) isUsingFallback = false; 
            if (isDataStale) isDataStale = false;
            updateWSStatus('live', 'LIVE'); 
        };
        wsConnection.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg && typeof msg.p === 'string') {
                    const tradePrice = safeValue(parseFloat(msg.p), 0);
                    if (tradePrice > 0) {
                        const previousPrice = lastPrice;
                        lastWSMessageTime = Date.now();
                        lastPriceUpdateTime = Date.now();
                        
                        if (isUsingFallback) { isUsingFallback = false; updateWSStatus('live', 'LIVE'); }
                        if (isDataStale) { isDataStale = false; updateWSStatus('live', 'LIVE'); }
                        
                        const tradeTime = msg.T || Date.now();
                        const currentCandleStart = getCandleStartTime(tradeTime);
                        if (candleData.length === 0) currentCandleStartTime = currentCandleStart;
                        if (candleData.length > 0 && currentCandleStart !== currentCandleStartTime) currentCandleStartTime = currentCandleStart;
                        
                        if (candleData.length > 0) {
                            const lastCandle = candleData[candleData.length - 1];
                            lastCandle.c = tradePrice;
                            if (tradePrice > lastCandle.h) lastCandle.h = tradePrice;
                            if (tradePrice < lastCandle.l) lastCandle.l = tradePrice;
                        }
                        
                        if (engine.bias && engine.bias !== "NEUTRAL") {
                            updateOBRealtime(tradePrice, previousPrice, engine.bias);
                        }
                        
                        if (currentPair === "XAUUSDT") {
                            updateDivergenceRealtime(tradePrice);
                        }
                        
                        calculateSMCLevels();
                        detectLiquiditySweep(tradePrice);
                        confirmBOS(tradePrice);
                        lastPrice = tradePrice;
                        throttledUpdateUI(tradePrice);
                    }
                }
            } catch(e) {}
        };
        wsConnection.onclose = () => {
            if (!isReloading && !isManualDisconnect) {
                updateWSStatus('reconnect', 'RECONNECT');
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => { 
                    if (!isReloading && !isManualDisconnect) { 
                        reconnectDelay = Math.min(reconnectDelay * 1.5, 30000); 
                        initWebSocket(); 
                    } 
                }, reconnectDelay);
            }
        };
        wsConnection.onerror = () => { 
            if (!isReloading) updateWSStatus('reconnect', 'ERROR'); 
        };
    }
    
    function cleanupWebSocket() {
        if (wsConnection) {
            isManualDisconnect = true;
            try {
                wsConnection.onopen = null; wsConnection.onmessage = null;
                wsConnection.onclose = null; wsConnection.onerror = null;
                if (wsConnection.readyState === WebSocket.OPEN || wsConnection.readyState === WebSocket.CONNECTING) wsConnection.close();
            } catch(e) {}
            wsConnection = null;
        }
        setTimeout(() => { isManualDisconnect = false; }, 100);
    }
    
    // ==================== DATA FETCHING ====================
    async function fetchKlines() {
        try {
            const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=150`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (Array.isArray(data)) {
                candleData = data.map(d => ({ 
                    t: d[0], 
                    o: safeValue(parseFloat(d[1]), 0), 
                    h: safeValue(parseFloat(d[2]), 0), 
                    l: safeValue(parseFloat(d[3]), 0), 
                    c: safeValue(parseFloat(d[4]), 0), 
                    v: safeValue(parseFloat(d[5]), 0) 
                }));
                
                if (candleData.length > 0) { 
                    const lastCandleTime = candleData[candleData.length - 1].t; 
                    currentCandleStartTime = getCandleStartTime(lastCandleTime); 
                }
                lastSMCUpdate = 0;
                calculateSMCLevels();
                if (candleData.length) { 
                    lastPrice = safeObject(candleData[candleData.length-1], 'c', 0); 
                    lastPriceUpdateTime = Date.now();
                    throttledUpdateUI(lastPrice); 
                }
                return true;
            }
        } catch(e) {}
        return false;
    }
    
    async function fetchPriceFromREST() {
        try {
            const url = `https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentPair}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && typeof data.price === 'string') {
                const newPrice = safeValue(parseFloat(data.price), 0);
                if (newPrice > 0) {
                    lastRESTUpdateTime = Date.now();
                    lastPriceUpdateTime = Date.now();
                    
                    const timeSinceLastWS = Date.now() - lastWSMessageTime;
                    if (timeSinceLastWS > 3000 || isUsingFallback) {
                        if (!isUsingFallback && timeSinceLastWS > 3000) { 
                            updateWSStatus('fallback', 'FALLBACK'); 
                            isUsingFallback = true; 
                        }
                        if (candleData.length > 0) {
                            const lastCandle = candleData[candleData.length - 1];
                            lastCandle.c = newPrice;
                            lastCandle.h = Math.max(lastCandle.h, newPrice);
                            lastCandle.l = Math.min(lastCandle.l, newPrice);
                        }
                        lastPrice = newPrice;
                        throttledUpdateUI(newPrice);
                        lastWSMessageTime = Date.now();
                    }
                    return newPrice;
                }
            }
        } catch(e) {}
        return null;
    }
    
    // ==================== INTERVAL MANAGEMENT ====================
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => { 
            if (wsConnection && wsConnection.readyState === WebSocket.OPEN) { 
                try { wsConnection.send(JSON.stringify({ method: "ping" })); } catch(e) {} 
            }
        }, 30000);
    }
    
    function startStuckChecker() {
        if (stuckCheckInterval) clearInterval(stuckCheckInterval);
        stuckCheckInterval = setInterval(() => {
            const now = Date.now();
            const timeSinceLastMsg = now - lastWSMessageTime;
            const timeSinceLastPrice = now - lastPriceUpdateTime;
            
            if (timeSinceLastPrice > DATA_STALE_THRESHOLD && lastPrice > 0) {
                if (!isDataStale) updateWSStatus('stale', 'DATA STALE');
            } else if (isDataStale && timeSinceLastPrice < 5000) {
                updateWSStatus(isUsingFallback ? 'fallback' : 'live', isUsingFallback ? 'FALLBACK' : 'LIVE');
            }
            
            if (wsConnection && wsConnection.readyState === WebSocket.OPEN && timeSinceLastMsg > 10000 && !isUsingFallback && !isReloading) {
                updateWSStatus('fallback', 'STUCK'); 
                isUsingFallback = true; 
                fetchPriceFromREST();
            } else if (wsConnection && wsConnection.readyState !== WebSocket.OPEN && !isReloading && !isManualDisconnect) { 
                updateWSStatus('reconnect', 'RECONNECT'); 
            }
        }, 5000);
    }
    
    function startPeriodicUpdates() { 
        if (periodicUpdateInterval) clearInterval(periodicUpdateInterval); 
        periodicUpdateInterval = setInterval(periodicUpdate, 2000); 
    }
    
    function startRestFallback() { 
        if (restFallbackInterval) clearInterval(restFallbackInterval); 
        restFallbackInterval = setInterval(fetchPriceFromREST, 5000); 
    }
    
    function startVolumeFetcher() {
        if (volumeFetcherInterval) clearInterval(volumeFetcherInterval);
        volumeFetcherInterval = setInterval(fetchLatestVolume, 3000);
    }
    
    function stopAllIntervals() {
        if (periodicUpdateInterval) { clearInterval(periodicUpdateInterval); periodicUpdateInterval = null; }
        if (restFallbackInterval) { clearInterval(restFallbackInterval); restFallbackInterval = null; }
        if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
        if (stuckCheckInterval) { clearInterval(stuckCheckInterval); stuckCheckInterval = null; }
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        if (newsCheckInterval) { clearInterval(newsCheckInterval); newsCheckInterval = null; }
        if (volumeFetcherInterval) { clearInterval(volumeFetcherInterval); volumeFetcherInterval = null; }
    }

    });
    
    window.copySwingHL = function() {
        const swingHigh = document.getElementById('swing-high-value')?.innerText || '--';
        const swingLow = document.getElementById('swing-low-value')?.innerText || '--';
        navigator.clipboard?.writeText(`Swing High: ${swingHigh} | Swing Low: ${swingLow}`);
        const container = document.getElementById('swing-hl-container');
        if (container) { container.classList.add('copied'); setTimeout(() => container.classList.remove('copied'), 300); }
    };
    
    window.smartCopy = function(id) {
        const el = document.getElementById(id);
        if (el) {
            let text = el.innerText;
            if (id === 'live-price') text = el.innerText.replace(/<[^>]*>/g, '');
            navigator.clipboard?.writeText(text);
            el.classList.add('copied');
            setTimeout(() => el.classList.remove('copied'), 300);
        }
    };
    
    function updateClock() {
        const now = new Date();
        const clockElem = document.getElementById('clock-display');
        const dateElem = document.getElementById('date-display');
        const sessionElem = document.getElementById('session-tag');
        if (clockElem) clockElem.innerText = now.toLocaleTimeString('id-ID');
        if (dateElem) dateElem.innerText = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;
        const hour = now.getHours();
        if (sessionElem) sessionElem.innerText = hour >= 7 && hour < 14 ? "ASIA" : (hour >= 14 && hour < 20 ? "LONDON" : "NY");
        checkNewsBlackout();
    }
    
    setInterval(updateClock, 1000);
    setInterval(fetchMTFData, 120000);
    
    fullReload();
    
})();
</script>
</body>
</html>
